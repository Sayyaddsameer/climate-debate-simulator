<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Climate Policy Debate Simulator</title>
    <meta name="description" content="A multi-agent AI simulation of global climate policy debate.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --usa-color: #ef4444;
            --eu-color: #eab308;
            --china-color: #22c55e;
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            line-height: 1.6;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            font-weight: 300;
            font-size: 1.1rem;
        }

        main {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .glass-panel {
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.6s ease-out;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, input[type="number"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        button {
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--accent) 0%, #6366f1 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(99, 102, 241, 0.3);
        }
        
        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .loading-indicator {
            display: none;
            text-align: center;
            margin: 1rem 0;
            color: var(--accent);
            font-weight: 600;
            animation: pulse 1.5s infinite ease-in-out;
        }

        #transcript {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            background: rgba(30, 41, 59, 0.5);
            border-left: 4px solid var(--glass-border);
            padding: 1.5rem;
            border-radius: 0 8px 8px 0;
            animation: slideInLeft 0.5s ease-out backwards;
            transition: transform 0.3s ease;
        }
        
        .message:hover {
            transform: translateX(4px);
        }
        
        .message.usa { border-color: var(--usa-color); }
        .message.eu { border-color: var(--eu-color); }
        .message.china { border-color: var(--china-color); }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .agent-name {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text-main);
        }
        
        .message.usa .agent-name { color: var(--usa-color); }
        .message.eu .agent-name { color: var(--eu-color); }
        .message.china .agent-name { color: var(--china-color); }

        .stance {
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .stance.supportive { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
        .stance.opposed { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        .stance.neutral { background: rgba(148, 163, 184, 0.2); color: #cbd5e1; }

        .message-content {
            line-height: 1.7;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Global Climate Debate</h1>
        <p class="subtitle">AI Multi-Agent Simulation: USA, EU, China</p>
    </header>

    <main>
        <section aria-labelledby="controls-heading" class="glass-panel controls">
            <h2 id="controls-heading" style="display:none;">Configure Debate</h2>
            <div class="input-group">
                <label for="topic">Debate Topic</label>
                <input type="text" id="topic" value="Implementing a global carbon tax" placeholder="Enter a climate policy topic...">
            </div>
            
            <div class="input-group">
                <label for="rounds">Number of Rounds</label>
                <input type="number" id="rounds" min="1" max="5" value="2">
            </div>

            <button id="start-btn">Initiate Simulation</button>
            <div id="loading" class="loading-indicator">Agents are deliberating... This may take a minute.</div>
        </section>

        <section aria-labelledby="transcript-heading" id="transcript" class="glass-panel" style="display: none;">
            <h2 id="transcript-heading" style="display:none;">Debate Transcript</h2>
            <!-- Messages will appear here -->
        </section>
    </main>

    <script src="/static/script.js"></script>
</body>
</html>
